<!DOCTYPE html>
<html>
<head><title>Generate Icons</title></head>
<body>
<p>Right-click each canvas and "Save Image As" to create icon-192.png and icon-512.png</p>
<h3>192×192</h3>
<canvas id="c192" width="192" height="192"></canvas>
<h3>512×512</h3>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function drawIcon(canvas) {
  const ctx = canvas.getContext('2d');
  const s = canvas.width;
  const r = s * 0.2;
  
  // Background
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.roundRect(0, 0, s, s, r);
  ctx.fill();
  
  // Circle
  ctx.strokeStyle = 'rgba(10, 132, 255, 0.3)';
  ctx.lineWidth = s * 0.02;
  ctx.beginPath();
  ctx.arc(s/2, s/2, s * 0.31, 0, Math.PI * 2);
  ctx.stroke();
  
  // Letter
  ctx.fillStyle = '#0A84FF';
  ctx.font = `bold ${s * 0.4}px -apple-system, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('F', s/2, s/2 + s*0.02);
}
drawIcon(document.getElementById('c192'));
drawIcon(document.getElementById('c512'));
</script>
</body>
</html>
