<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000000">
  <title>FitOS</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/design-system.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>
  <div id="app">
    <div class="status-bar-spacer"></div>
    <main id="page-container"></main>

    <!-- Bottom Navigation - 3 Tabs -->
    <nav id="bottom-nav" class="bottom-nav">
      <button class="nav-item active" data-page="home">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        <span>Home</span>
      </button>
      <button class="nav-item" data-page="meals">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 8h1a4 4 0 0 1 0 8h-1"/>
          <path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/>
          <line x1="6" y1="1" x2="6" y2="4"/>
          <line x1="10" y1="1" x2="10" y2="4"/>
          <line x1="14" y1="1" x2="14" y2="4"/>
        </svg>
        <span>Meals</span>
      </button>
      <button class="nav-item" data-page="workout">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M6.5 6.5h11M6.5 17.5h11M2 12h2m16 0h2M4.5 6.5v11M19.5 6.5v11"/>
          <rect x="6.5" y="4" width="2" height="16" rx="1"/>
          <rect x="15.5" y="4" width="2" height="16" rx="1"/>
        </svg>
        <span>Workout</span>
      </button>
    </nav>
  </div>

  <div id="modal-container"></div>
  <div id="toast-container"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
